components:
  schemas:
    TeamDynamix_Api:
      title: Api
      description: |-
        **Unless explicitly stated on the documentation for a method, the accepted Web API call content types are:**

        * application/json

        **Calls using any other content type (ex: text/plain) are not supported.**

        1. [APIs](../../index.html)
        2. **TeamDynamix.Api.ResourceItem**
      type: object
      properties:
        ItemRole:
          description: The role the resource has on the associated item.
          type: string
        Name:
          type: object
        Initials:
          description: The initials to be displayed if no profile image is specified for the resource.
          type: string
        Value:
          type: object
        RefValue:
          type: object
        ProfileImageFileName:
          description: The profile image file name of the resource.
          type: string
        Plan:
          description: The plan.
          type: object
        Tasks:
          description: The tasks whose values have changed.
          type: array
          items:
            type: object
        Succeeded:
          type: object
        AnyNewTaskAssignments:
          type: object
        ErrorID:
          type: object
        Message:
          description: The error message to display to the user when the operation was unsuccessful.
          type: string
        op:
          description: The name of the JSON patch operation being performed.
          type: object
        path:
          description: The JSON pointer to the field to update. This is required for all operations.
          type: object
        from:
          description: The JSON pointer to the source field. This is required for the `copy` and `move` operations.
          type: string
        value:
          description: The value to use for the operation. This is required for `add` and `replace` operations.
          type: object
        PageIndex:
          description: The 0-based page index to request.
          type: object
        PageSize:
          description: The size of each page being requested, ranging `1`-`200` (inclusive).
          type: object
        Data:
          description: The data being returned in the page.
          type: array
          items:
            type: object
        TotalCount:
          type: object
        CurrentPageIndex:
          type: object
    Accounts:
      title: Accounts
      description: |-
        **Unless explicitly stated on the documentation for a method, the accepted Web API call content types are:**

        * application/json

        **Calls using any other content type (ex: text/plain) are not supported.**

        1. [APIs](../../index.html)
        2. **TeamDynamix.Api.Accounts.AccountSearch**
      type: object
      properties:
        SearchText:
          description: The search text to filter on. Searches against the account name, code, and URL fields.
          type: string
        ManagerUids:
          description: The UIDs of the department managers to filter on.
          type: array
          items:
            type: string
            format: uuid
          format: uuid
        CustomAttributes:
          description: The custom attributes to filter on.
          type: array
          items:
            type: object
        IsActive:
          description: The active status to filter on.
          type: boolean
        MaxResults:
          description: The maximum number of records to return.
          type: integer
          format: int32
        ParentAccountID:
          description: The ID of the parent account to filter on.
          type: integer
