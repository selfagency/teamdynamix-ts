name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint (Oxc)
        run: pnpm run lint

      - name: Format check (Oxc)
        run: pnpm run format:check

      - name: Markdown lint (Rumdl)
        run: pnpm run lint:md

      - name: Fallow
        continue-on-error: true
        uses: fallow-rs/fallow@647fe2d90f7316b9a95ccd690481224e9a95333b # v2.89.0
        with:
          command: audit
          format: sarif
          annotations: true
          comment: true
          review-comments: true
          review-guidance: false
          max-annotations: 50
          fail-on-issues: true
          gate: new-only

      - name: Split SARIF into per-run files
        if: always()
        run: |
          mkdir -p sarif-runs
          run_count=$(jq '.runs | length' fallow-results.sarif 2>/dev/null || echo 0)
          for i in $(seq 0 $((run_count - 1))); do
            jq \
              --arg id "fallow-run-$i" \
              '{version: "2.1.0", runs: [.runs[$i] | .automationDetails.id = $id]}' \
              fallow-results.sarif > "sarif-runs/run-$i.sarif"
          done

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-runs
        
      - name: Test (Vitest)
        run: pnpm run test:coverage --reporter=default --reporter=junit --outputFile=test-report.junit.xml

      - name: Prepare OpenAPI spec for docs build
        run: |
          test -f src/generated/openapi.json || { echo "Missing required file: src/generated/openapi.json"; exit 1; }
          mkdir -p output
          cp src/generated/openapi.json output/openapi-types.json

      - name: Build docs (VitePress)
        run: pnpm run docs:build

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage reports to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
